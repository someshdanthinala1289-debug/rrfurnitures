<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RR Furniture | Cart</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans text-slate-800">
  <nav class="border-b border-slate-200 bg-white">
    <div class="mx-auto flex max-w-5xl flex-col gap-3 px-4 py-4 sm:px-6 md:flex-row md:items-center md:justify-between">
      <a href="index.html" class="text-xl font-bold text-amber-800 sm:text-2xl">RR Furniture</a>
      <a
        href="products.html"
        class="inline-flex items-center justify-center rounded-full border border-slate-200 px-4 py-2 text-sm text-slate-700 hover:bg-slate-100 md:w-auto"
      >
        Continue shopping
      </a>
    </div>
  </nav>

  <main class="mx-auto max-w-5xl px-4 py-8 sm:px-6 sm:py-10">
    <h1 class="mb-6 text-2xl font-bold text-amber-800 sm:text-3xl">Your Cart</h1>

    <section id="cartContainer" class="space-y-4"></section>
    <div id="cartSummary" class="mt-6"></div>

    <section id="customerForm" class="mt-6 rounded-[2rem] bg-white p-5 shadow sm:p-6">
      <h2 class="text-lg font-semibold text-slate-900">Delivery Details</h2>
      <p class="mt-1 text-sm text-slate-500">Fill this before placing the order on WhatsApp.</p>

      <div class="mt-4 grid gap-3">
        <input id="custName" placeholder="Your Name" class="w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm outline-none focus:border-amber-600">
        <input id="custPhone" placeholder="Phone Number" class="w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm outline-none focus:border-amber-600">
        <textarea id="custAddress" placeholder="Address" class="min-h-[120px] w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm outline-none focus:border-amber-600"></textarea>
      </div>
    </section>
  </main>

  <script src="./cart.js"></script>
</body>
</html>
