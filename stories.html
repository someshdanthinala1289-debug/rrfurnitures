<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RR Furnitures | Customer Stories</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            wood: {
              50: "#fbf5ef",
              100: "#f3e6d6",
              500: "#b36b1b",
              700: "#7b4211"
            }
          },
          fontFamily: {
            sans: ["Manrope", "ui-sans-serif", "system-ui", "sans-serif"]
          }
        }
      }
    };
  </script>
</head>
<body class="bg-[#faf8f5] font-sans text-stone-900">
  <header class="border-b border-stone-200 bg-white">
    <div class="mx-auto flex max-w-7xl flex-col gap-3 px-4 py-4 sm:px-6 md:flex-row md:items-center md:justify-between">
      <a href="index.html" class="text-xl font-extrabold text-wood-700 sm:text-2xl">RR Furnitures</a>

      <div class="flex flex-wrap items-center gap-3 text-sm font-semibold text-stone-700">
        <a href="index.html" class="rounded-full px-4 py-2 hover:bg-wood-50 hover:text-wood-700">Home</a>
        <a href="products.html" class="rounded-full px-4 py-2 hover:bg-wood-50 hover:text-wood-700">Products</a>
        <a href="our-work.html" class="rounded-full px-4 py-2 hover:bg-wood-50 hover:text-wood-700">Our Work</a>
        <a href="https://wa.me/919381049087" class="rounded-full bg-green-600 px-4 py-2 text-white">WhatsApp</a>
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-7xl px-4 py-8 sm:px-6 sm:py-10">
    <section class="rounded-[2rem] bg-white p-6 shadow-sm sm:p-8">
      <div class="flex flex-col gap-4 md:flex-row md:items-end md:justify-between">
        <div>
          <p class="text-xs font-extrabold uppercase tracking-[0.18em] text-wood-700">Real inspiration</p>
          <h1 class="mt-2 text-3xl font-extrabold text-stone-950 sm:text-4xl">Customer Stories</h1>
          <p class="mt-3 max-w-2xl text-sm leading-6 text-stone-600 sm:text-base">
            Inspiration images and short story blocks added from the admin panel.
          </p>
        </div>

        <a href="index.html#stories" class="inline-flex items-center justify-center rounded-2xl border border-stone-200 px-5 py-3 text-sm font-bold text-stone-700">
          Back to Home
        </a>
      </div>

      <div id="storiesStatus" class="mt-6 rounded-2xl border border-stone-200 bg-stone-50 px-4 py-3 text-sm text-stone-600">
        Loading stories...
      </div>

      <div id="storiesGrid" class="mt-8 grid gap-5 sm:grid-cols-2 xl:grid-cols-3"></div>
    </section>
  </main>

  <script type="module">
    import { getAllStories } from "./firebase.js?v=20260515-3";

    const statusEl = document.getElementById("storiesStatus");
    const gridEl = document.getElementById("storiesGrid");

    const fallbackStories = [
      {
        title: "Warm Living Room Story",
        image: "assets/products/sample-sofa.svg",
        tag: "Living Room",
        cta: "View Style",
        desc: "A soft, warm look for family seating areas with layered textures and wooden details."
      },
      {
        title: "Compact Study Corner",
        image: "https://images.unsplash.com/photo-1513694203232-719a280e022f?q=80&w=1200&auto=format&fit=crop",
        tag: "Study",
        cta: "See Details",
        desc: "A simple inspiration block for work-from-home setups and student-friendly rooms."
      }
    ];

    function renderStories(stories) {
      gridEl.innerHTML = stories.map((story) => `
        <article class="overflow-hidden rounded-[1.75rem] bg-stone-50 shadow-sm ring-1 ring-stone-100">
          <div class="aspect-[4/3] overflow-hidden">
            <img src="${story.image}" alt="${story.title || "Story"}" class="h-full w-full object-cover">
          </div>
          <div class="p-5">
            <div class="flex items-start justify-between gap-3">
              <div>
                <h2 class="text-lg font-extrabold text-stone-950">${story.title || "Customer story"}</h2>
                <p class="mt-1 text-sm text-stone-500">${story.tag || "Inspiration"}</p>
              </div>
              <span class="rounded-full bg-wood-100 px-3 py-1 text-[11px] font-bold uppercase tracking-[0.12em] text-wood-700">${story.cta || "Story"}</span>
            </div>
            <p class="mt-3 text-sm leading-6 text-stone-600">${story.desc || "Interior inspiration added from the admin panel."}</p>
          </div>
        </article>
      `).join("");
    }

    async function loadStories() {
      try {
        const stories = await getAllStories();
        if (stories.length) {
          statusEl.textContent = `Showing ${stories.length} stor${stories.length === 1 ? "y" : "ies"} from the admin panel.`;
          statusEl.className = "mt-6 rounded-2xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm text-emerald-800";
          renderStories(stories);
          return;
        }
      } catch (error) {
        console.error("Could not load stories", error);
      }

      statusEl.textContent = "No live stories found yet. Showing sample story cards for now.";
      statusEl.className = "mt-6 rounded-2xl border border-amber-200 bg-amber-50 px-4 py-3 text-sm text-amber-800";
      renderStories(fallbackStories);
    }

    loadStories();
  </script>
</body>
</html>
