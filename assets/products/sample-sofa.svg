<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Sample Sofa Product Image</title>
  <desc id="desc">A simple local sample image for testing product uploads.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f2ea"/>
      <stop offset="100%" stop-color="#eadfce"/>
    </linearGradient>
    <linearGradient id="sofa" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#31554f"/>
      <stop offset="100%" stop-color="#1f3834"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="900" fill="url(#bg)"/>
  <rect x="0" y="700" width="1200" height="200" fill="#e7d8c5"/>
  <rect x="90" y="730" width="1020" height="18" rx="9" fill="#d6c2aa" opacity="0.7"/>

  <rect x="170" y="320" width="860" height="230" rx="48" fill="url(#sofa)"/>
  <rect x="190" y="245" width="290" height="170" rx="42" fill="url(#sofa)"/>
  <rect x="470" y="245" width="260" height="170" rx="42" fill="url(#sofa)"/>
  <rect x="720" y="245" width="290" height="170" rx="42" fill="url(#sofa)"/>

  <rect x="130" y="340" width="70" height="180" rx="30" fill="#26433e"/>
  <rect x="1000" y="340" width="70" height="180" rx="30" fill="#26433e"/>

  <rect x="250" y="365" width="310" height="115" rx="36" fill="#446f68"/>
  <rect x="640" y="365" width="310" height="115" rx="36" fill="#365c56"/>
  <rect x="275" y="500" width="650" height="72" rx="28" fill="#294741"/>

  <rect x="215" y="550" width="28" height="120" rx="14" fill="#9b6a3f"/>
  <rect x="960" y="550" width="28" height="120" rx="14" fill="#9b6a3f"/>
  <rect x="320" y="550" width="28" height="120" rx="14" fill="#9b6a3f"/>
  <rect x="855" y="550" width="28" height="120" rx="14" fill="#9b6a3f"/>

  <text x="600" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="58" font-weight="700" fill="#8a5108">
    RR Furnitures Sample Image
  </text>
  <text x="600" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#4b5563">
    Store product photos in assets/products and use the file path in admin.html
  </text>
  <text x="600" y="820" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#1f2937">
    Example path: assets/products/sample-sofa.svg
  </text>
</svg>
