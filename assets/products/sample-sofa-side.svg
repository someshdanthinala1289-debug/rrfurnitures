<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Sample Sofa Side View</title>
  <desc id="desc">A local side-view sample image for product gallery testing.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7efe6"/>
      <stop offset="100%" stop-color="#e8dbc8"/>
    </linearGradient>
    <linearGradient id="sofa" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#375d56"/>
      <stop offset="100%" stop-color="#223d39"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="900" fill="url(#bg)"/>
  <rect x="0" y="720" width="1200" height="180" fill="#dfcfba"/>

  <rect x="300" y="325" width="560" height="220" rx="52" fill="url(#sofa)"/>
  <rect x="300" y="255" width="350" height="160" rx="46" fill="url(#sofa)"/>
  <rect x="255" y="345" width="72" height="190" rx="26" fill="#294641"/>
  <rect x="825" y="360" width="52" height="170" rx="22" fill="#294641"/>
  <rect x="350" y="495" width="390" height="62" rx="24" fill="#28453f"/>

  <rect x="340" y="548" width="24" height="110" rx="12" fill="#9a6b43"/>
  <rect x="780" y="548" width="24" height="110" rx="12" fill="#9a6b43"/>

  <text x="600" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="54" font-weight="700" fill="#8a5108">
    Sample Sofa Side View
  </text>
  <text x="600" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" fill="#4b5563">
    Example local gallery image
  </text>
</svg>
