<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RR Furnitures | Products</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans text-slate-800">
  <nav class="border-b border-slate-200 bg-white">
    <div class="mx-auto flex max-w-6xl flex-col gap-3 px-4 py-4 sm:px-6 md:flex-row md:items-center md:justify-between">
      <a href="index.html" class="text-xl font-bold text-amber-800 sm:text-2xl">RR Furniture</a>

      <div class="flex flex-wrap items-center gap-3 text-sm">
        <a href="index.html" class="rounded-full px-3 py-2 text-slate-700 hover:bg-slate-100">Home</a>
        <a href="cart.html" class="rounded-full border border-slate-200 px-3 py-2 text-slate-700 hover:bg-slate-100">Cart</a>
        <a href="https://wa.me/919381049087" class="rounded-full bg-green-600 px-4 py-2 font-medium text-white">WhatsApp</a>
      </div>
    </div>
  </nav>

  <main class="mx-auto max-w-6xl px-4 py-8 sm:px-6 sm:py-10">
    <div class="mb-6 flex flex-col gap-4 md:flex-row md:items-end md:justify-between">
      <div>
        <h1 class="text-3xl font-bold text-amber-800">Our Products</h1>
        <p class="mt-2 text-sm text-gray-500">Browse our furniture collection</p>
      </div>

      <input
        id="search"
        type="text"
        placeholder="Search products..."
        class="w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm outline-none focus:border-amber-600 md:w-72"
      >
    </div>

    <section id="productsGrid" class="grid grid-cols-2 gap-3 sm:gap-5 lg:grid-cols-3"></section>
  </main>

  <script type="module">
    import { getAllProducts } from "./firebase.js";

    const grid = document.getElementById("productsGrid");
    const searchInput = document.getElementById("search");

    let allProducts = [];

    function renderLoading() {
      grid.innerHTML = `
          <div class="col-span-full flex flex-col items-center justify-center rounded-3xl bg-white px-6 py-12 text-center shadow">
          <div class="h-10 w-10 animate-spin rounded-full border-4 border-slate-200 border-t-amber-600"></div>
          <p class="mt-4 text-sm font-medium text-slate-700">Loading products...</p>
          <p class="mt-1 text-xs text-slate-500">Please wait a moment.</p>
        </div>
      `;
    }

    const params = new URLSearchParams(window.location.search);
    const selectedCategory = params.get("cat");

    function formatPrice(price) {
      return `Rs. ${Number(price || 0).toLocaleString()}`;
    }

    function render(list) {
      grid.innerHTML = "";

      if (!list.length) {
        grid.innerHTML = `
          <div class="col-span-full rounded-3xl bg-white p-8 text-center text-sm text-gray-500 shadow">
            No products found.
          </div>
        `;
        return;
      }

      list.forEach((product) => {
        const card = document.createElement("article");
        card.className = "overflow-hidden rounded-[1.25rem] bg-white shadow sm:rounded-3xl";

        card.innerHTML = `
          <div class="aspect-[5/4] overflow-hidden bg-slate-100 sm:aspect-[4/3]">
            <img src="${product.img}" alt="${product.name}" class="h-full w-full object-cover">
          </div>

          <div class="p-2.5 sm:p-5">
            <div class="flex items-start justify-between gap-2">
              <h2 class="line-clamp-2 text-sm font-semibold text-slate-900 sm:text-lg">${product.name}</h2>
              <span class="shrink-0 rounded-full bg-slate-100 px-2 py-1 text-[10px] font-medium uppercase tracking-wide text-slate-500 sm:px-3 sm:text-[11px]">
                ${product.category || "uncategorized"}
              </span>
            </div>
            <p class="mt-1.5 line-clamp-2 text-[11px] leading-5 text-slate-500 sm:text-sm sm:leading-6">${product.desc || "Solid wood furniture crafted for everyday comfort."}</p>

            <div class="mt-2.5 flex flex-col gap-0.5 sm:mt-4 sm:flex-row sm:items-center sm:justify-between sm:gap-3">
              <p class="text-sm font-bold text-amber-800 sm:text-base">${formatPrice(product.price)}</p>
              <p class="text-[11px] text-slate-500 sm:text-xs">${product.stock ?? 0} in stock</p>
            </div>

            <div class="mt-3 grid grid-cols-2 gap-2 sm:mt-4 sm:flex sm:flex-col">
              <a
                href="product.html?id=${product.id}"
                class="inline-flex items-center justify-center rounded-xl border border-slate-200 px-2 py-2.5 text-xs font-medium text-slate-700 sm:rounded-2xl sm:px-4 sm:py-3 sm:text-sm"
              >
                View
              </a>

              <button
                onclick="addToCart('${product.id}')"
                class="inline-flex items-center justify-center rounded-xl bg-amber-600 px-2 py-2.5 text-xs font-medium text-white sm:rounded-2xl sm:px-4 sm:py-3 sm:text-sm"
              >
                Add to Cart
              </button>
            </div>
          </div>
        `;

        grid.appendChild(card);
      });
    }

    async function loadProducts() {
      renderLoading();
      allProducts = await getAllProducts();

      if (selectedCategory) {
        render(allProducts.filter((product) => product.category?.toLowerCase() === selectedCategory.toLowerCase()));
        return;
      }

      render(allProducts);
    }

    searchInput.addEventListener("input", () => {
      const query = searchInput.value.toLowerCase().trim();

      const filtered = allProducts.filter((product) =>
        `${product.name} ${product.desc || ""} ${product.category || ""}`.toLowerCase().includes(query)
      );

      render(filtered);
    });

    window.addToCart = function addToCart(id) {
      const product = allProducts.find((item) => item.id === id);
      if (!product) return;

      const cart = JSON.parse(localStorage.getItem("cart") || "[]");
      const existing = cart.find((item) => item.id === id);

      if (existing) {
        existing.qty += 1;
      } else {
        cart.push({
          id: product.id,
          name: product.name,
          price: product.price,
          img: product.img,
          qty: 1
        });
      }

      localStorage.setItem("cart", JSON.stringify(cart));
      alert("Added to cart");
    };

    loadProducts();
  </script>
</body>
</html>
