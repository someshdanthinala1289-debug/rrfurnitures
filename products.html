<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RR Furnitures | Products</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 font-sans">

<!-- NAVBAR -->
<nav class="bg-white shadow-md px-6 py-4 flex justify-between items-center">
  <a href="index.html" class="text-2xl font-bold text-amber-800">RR Furniture</a>

  <div class="flex gap-4 text-sm">
    <a href="index.html">Home</a>
    <a href="cart.html">Cart</a>
  </div>
</nav>

<!-- MAIN -->
<main class="max-w-6xl mx-auto px-4 py-10">

  <!-- HEADER -->
  <div class="flex flex-col md:flex-row md:justify-between gap-4 mb-6">

    <div>
      <h1 class="text-3xl font-bold text-amber-800">Our Products</h1>
      <p class="text-sm text-gray-500">Browse furniture collection</p>
    </div>

    <!-- SEARCH -->
    <input id="search" type="text"
      placeholder="Search products..."
      class="border px-4 py-2 rounded w-full md:w-72" />

  </div>

  <!-- PRODUCTS -->
  <section id="productsGrid"
    class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
  </section>

</main>

<!-- SCRIPT -->
<script type="module">

import { getAllProducts } from "./firebase.js";

const grid = document.getElementById("productsGrid");
const searchInput = document.getElementById("search");

let allProducts = [];

// 🔥 GET CATEGORY FROM URL
const params = new URLSearchParams(window.location.search);
const selectedCategory = params.get("cat");

// 🔥 LOAD PRODUCTS
async function loadProducts() {
  allProducts = await getAllProducts();

  // CATEGORY FILTER
  if (selectedCategory) {
    const filtered = allProducts.filter(p =>
      p.category?.toLowerCase() === selectedCategory.toLowerCase()
    );
    render(filtered);
  } else {
    render(allProducts);
  }
}

// 🔥 RENDER
function render(list) {
  grid.innerHTML = "";

  if (!list.length) {
    grid.innerHTML = "<p class='text-gray-500'>No products found</p>";
    return;
  }

  list.forEach(p => {
    const card = document.createElement("div");
    card.className = "bg-white rounded-lg shadow p-4";

    card.innerHTML = `
      <img src="${p.img}" class="h-48 w-full object-cover rounded">

      <h3 class="mt-2 font-semibold">${p.name}</h3>

      <p class="text-amber-800 font-bold">
        ₹${p.price.toLocaleString()}
      </p>

      <div class="mt-3 flex justify-between">
        <a href="product.html?id=${p.id}"
           class="text-sm border px-3 py-1 rounded">
          View
        </a>

        <button onclick="addToCart('${p.id}')"
          class="text-sm bg-amber-600 text-white px-3 py-1 rounded">
          Add
        </button>
      </div>
    `;

    grid.appendChild(card);
  });
}

// 🔥 SEARCH FILTER
searchInput.addEventListener("input", () => {
  const q = searchInput.value.toLowerCase();

  const filtered = allProducts.filter(p =>
    (p.name + (p.desc || "")).toLowerCase().includes(q)
  );

  render(filtered);
});

// 🔥 ADD TO CART
window.addToCart = function(id) {
  const product = allProducts.find(p => p.id === id);

  let cart = JSON.parse(localStorage.getItem("cart") || "[]");

  const found = cart.find(i => i.id === id);

  if (found) {
    found.qty += 1;
  } else {
    cart.push({ ...product, qty: 1 });
  }

  localStorage.setItem("cart", JSON.stringify(cart));

  alert("Added to cart");
};

// INIT
loadProducts();

</script>

</body>
</html>
