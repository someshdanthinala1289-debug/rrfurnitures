<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Product Details | RR Furnitures</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<!-- NAV -->
<nav class="bg-white shadow px-6 py-4 flex justify-between">
  <a href="index.html" class="font-bold text-amber-800 text-xl">RR Furniture</a>
  <a href="products.html">Back</a>
</nav>

<!-- MAIN -->
<div class="max-w-5xl mx-auto p-6 bg-white mt-10 rounded shadow">

  <div id="productBox"></div>

</div>

<!-- SCRIPT -->
<script type="module">

import { getProductById } from "./firebase.js";

// 🔥 GET ID FROM URL
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const box = document.getElementById("productBox");

async function loadProduct() {

  if (!id) {
    box.innerHTML = "<p>Product not found</p>";
    return;
  }

  const p = await getProductById(id);

  if (!p) {
    box.innerHTML = "<p>Product not found</p>";
    return;
  }

  box.innerHTML = `
    <div class="grid md:grid-cols-2 gap-8">

      <!-- IMAGE -->
      <img src="${p.img}" class="rounded w-full h-80 object-cover">

      <!-- DETAILS -->
      <div>
        <h1 class="text-3xl font-bold">${p.name}</h1>

        <p class="text-amber-800 text-xl mt-3 font-semibold">
          ₹${p.price.toLocaleString()}
        </p>

        <p class="mt-3 text-gray-600">
          ${p.desc || "No description available"}
        </p>

        <p class="mt-2 text-sm text-gray-500">
          Stock: ${p.stock}
        </p>

        <!-- BUTTONS -->
        <div class="mt-6 flex gap-4">

          <button onclick="addToCart('${p.id}')"
            class="bg-amber-600 text-white px-6 py-2 rounded">
            Add to Cart
          </button>

          <a href="https://wa.me/919381049087?text=I%20want%20${p.name}"
             class="bg-green-600 text-white px-6 py-2 rounded">
             Order on WhatsApp
          </a>

        </div>

      </div>

    </div>
  `;
}

// 🔥 ADD TO CART
window.addToCart = function(id) {
  let cart = JSON.parse(localStorage.getItem("cart") || "[]");

  const found = cart.find(i => i.id === id);

  if (found) {
    found.qty += 1;
  } else {
   cart.push({
  id: p.id,
  name: p.name,
  price: p.price,
  img: p.img,
  qty: 1
});
  }

  localStorage.setItem("cart", JSON.stringify(cart));

  alert("Added to cart");
};

// INIT
loadProduct();

</script>

</body>
</html>
