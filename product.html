<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details | RR Furnitures</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-slate-800">
  <nav class="border-b border-slate-200 bg-white">
    <div class="mx-auto flex max-w-6xl flex-col gap-3 px-4 py-4 sm:px-6 sm:py-5 md:flex-row md:items-center md:justify-between">
      <a href="index.html" class="text-xl font-bold text-amber-800 sm:text-2xl">RR Furniture</a>

      <div class="flex flex-wrap items-center gap-3 text-sm">
        <a href="products.html" class="rounded-full px-3 py-2 text-slate-700 hover:bg-slate-100">Back to Products</a>
        <a href="cart.html" class="rounded-full border border-slate-200 px-3 py-2 text-slate-700 hover:bg-slate-100">Cart</a>
      </div>
    </div>
  </nav>

  <main class="mx-auto max-w-6xl px-4 py-8 sm:px-6 sm:py-10">
    <section class="overflow-hidden rounded-[2rem] bg-white p-5 shadow sm:p-6 md:p-8">
      <div id="productBox"></div>
    </section>
  </main>

  <script type="module">
    import { getProductById } from "./firebase.js";

    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");
    const box = document.getElementById("productBox");
    let currentProduct = null;
    let currentGalleryImages = [];
    let currentImageIndex = 0;

    const galleryFallbacks = {
      sofa: [
        "https://images.unsplash.com/photo-1555041469-a586c61ea9bc?auto=format&fit=crop&w=1200&q=80",
        "https://images.unsplash.com/photo-1493663284031-b7e3aefcae8e?auto=format&fit=crop&w=1200&q=80",
        "https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?auto=format&fit=crop&w=1200&q=80"
      ],
      bed: [
        "https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?auto=format&fit=crop&w=1200&q=80",
        "https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?auto=format&fit=crop&w=1200&q=80",
        "https://images.unsplash.com/photo-1505693533278-c0eea7fe9fd2?auto=format&fit=crop&w=1200&q=80"
      ],
      chair: [
        "https://images.unsplash.com/photo-1519947486511-46149fa0a254?auto=format&fit=crop&w=1200&q=80",
        "https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?auto=format&fit=crop&w=1200&q=80",
        "https://images.unsplash.com/photo-1484101403633-562f891dc89a?auto=format&fit=crop&w=1200&q=80"
      ],
      study: [
        "https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?auto=format&fit=crop&w=1200&q=80",
        "https://images.unsplash.com/photo-1497366754035-f200968a6e72?auto=format&fit=crop&w=1200&q=80",
        "https://images.unsplash.com/photo-1513694203232-719a280e022f?auto=format&fit=crop&w=1200&q=80"
      ],
      dining: [
        "https://images.unsplash.com/photo-1449247709967-d4461a6a6103?auto=format&fit=crop&w=1200&q=80",
        "https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?auto=format&fit=crop&w=1200&q=80",
        "https://images.unsplash.com/photo-1484154218962-a197022b5858?auto=format&fit=crop&w=1200&q=80"
      ],
      wardrobe: [
        "https://images.unsplash.com/photo-1484154218962-a197022b5858?auto=format&fit=crop&w=1200&q=80",
        "https://images.unsplash.com/photo-1556911220-bff31c812dba?auto=format&fit=crop&w=1200&q=80",
        "https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?auto=format&fit=crop&w=1200&q=80"
      ],
      storage: [
        "https://images.unsplash.com/photo-1484154218962-a197022b5858?auto=format&fit=crop&w=1200&q=80",
        "https://images.unsplash.com/photo-1556911220-e15b29be8c8f?auto=format&fit=crop&w=1200&q=80",
        "https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?auto=format&fit=crop&w=1200&q=80"
      ],
      default: [
        "https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?auto=format&fit=crop&w=1200&q=80",
        "https://images.unsplash.com/photo-1484154218962-a197022b5858?auto=format&fit=crop&w=1200&q=80",
        "https://images.unsplash.com/photo-1493663284031-b7e3aefcae8e?auto=format&fit=crop&w=1200&q=80"
      ]
    };

    function formatPrice(price) {
      return `Rs. ${Number(price || 0).toLocaleString()}`;
    }

    function getGalleryImages(product) {
      const savedImages = [product.img, ...(Array.isArray(product.images) ? product.images : [])]
        .filter(Boolean)
        .filter((image, index, list) => list.indexOf(image) === index);

      if (savedImages.length) {
        return savedImages;
      }

      const categoryKey = (product.category || "").trim().toLowerCase();
      const fallbackImages = galleryFallbacks[categoryKey] || galleryFallbacks.default;
      return fallbackImages.filter((image, index, list) => list.indexOf(image) === index);
    }

    function renderGallery() {
      const mainImage = document.getElementById("productMainImage");
      const counter = document.getElementById("galleryCounter");
      const thumbnails = document.querySelectorAll("[data-gallery-thumb]");

      if (!mainImage || !currentGalleryImages.length) return;

      mainImage.src = currentGalleryImages[currentImageIndex];
      mainImage.alt = `${currentProduct.name} image ${currentImageIndex + 1}`;

      if (counter) {
        counter.textContent = `${currentImageIndex + 1} / ${currentGalleryImages.length}`;
      }

      thumbnails.forEach((thumb, index) => {
        thumb.classList.toggle("ring-2", index === currentImageIndex);
        thumb.classList.toggle("ring-amber-600", index === currentImageIndex);
        thumb.classList.toggle("opacity-100", index === currentImageIndex);
        thumb.classList.toggle("opacity-70", index !== currentImageIndex);
      });
    }

    function bindGalleryEvents() {
      const prevButton = document.getElementById("galleryPrev");
      const nextButton = document.getElementById("galleryNext");
      const thumbnails = document.querySelectorAll("[data-gallery-thumb]");

      prevButton?.addEventListener("click", () => {
        currentImageIndex = (currentImageIndex - 1 + currentGalleryImages.length) % currentGalleryImages.length;
        renderGallery();
      });

      nextButton?.addEventListener("click", () => {
        currentImageIndex = (currentImageIndex + 1) % currentGalleryImages.length;
        renderGallery();
      });

      thumbnails.forEach((thumb) => {
        thumb.addEventListener("click", () => {
          currentImageIndex = Number(thumb.dataset.galleryThumb || 0);
          renderGallery();
        });
      });
    }

    function renderLoading() {
      box.innerHTML = `
        <div class="flex flex-col items-center justify-center rounded-3xl bg-slate-50 px-6 py-12 text-center">
          <div class="h-10 w-10 animate-spin rounded-full border-4 border-slate-200 border-t-amber-600"></div>
          <p class="mt-4 text-sm font-medium text-slate-700">Loading product...</p>
          <p class="mt-1 text-xs text-slate-500">Please wait a moment.</p>
        </div>
      `;
    }

    function renderNotFound() {
      box.innerHTML = `
        <div class="rounded-3xl bg-slate-50 p-8 text-center">
          <p class="text-lg font-semibold text-slate-900">Product not found</p>
          <p class="mt-2 text-sm text-slate-500">Please go back and choose another product.</p>
          <a href="products.html" class="mt-5 inline-flex rounded-2xl bg-amber-600 px-5 py-3 text-sm font-medium text-white">
            Browse Products
          </a>
        </div>
      `;
    }

    async function loadProduct() {
      if (!id) {
        renderNotFound();
        return;
      }

      renderLoading();
      currentProduct = await getProductById(id);

      if (!currentProduct) {
        renderNotFound();
        return;
      }

      currentGalleryImages = getGalleryImages(currentProduct);
      currentImageIndex = 0;

      box.innerHTML = `
        <div class="grid gap-6 md:grid-cols-2 md:gap-8">
          <div class="space-y-3">
            <div class="relative overflow-hidden rounded-[1.5rem] bg-slate-100">
              <img
                id="productMainImage"
                src="${currentGalleryImages[0]}"
                alt="${currentProduct.name}"
                class="h-full min-h-[280px] w-full object-cover sm:min-h-[360px]"
              >

              <button
                id="galleryPrev"
                type="button"
                class="absolute left-3 top-1/2 inline-flex h-10 w-10 -translate-y-1/2 items-center justify-center rounded-full bg-white/90 text-lg text-slate-700 shadow"
                aria-label="Previous image"
              >
                &#8249;
              </button>

              <button
                id="galleryNext"
                type="button"
                class="absolute right-3 top-1/2 inline-flex h-10 w-10 -translate-y-1/2 items-center justify-center rounded-full bg-white/90 text-lg text-slate-700 shadow"
                aria-label="Next image"
              >
                &#8250;
              </button>

              <div
                id="galleryCounter"
                class="absolute bottom-3 right-3 rounded-full bg-slate-900/75 px-3 py-1 text-xs font-medium text-white"
              >
                1 / ${currentGalleryImages.length}
              </div>
            </div>

            <div class="grid grid-cols-4 gap-2 sm:gap-3">
              ${currentGalleryImages.map((image, index) => `
                <button
                  type="button"
                  data-gallery-thumb="${index}"
                  class="overflow-hidden rounded-2xl bg-slate-100 opacity-70 transition"
                  aria-label="Show image ${index + 1}"
                >
                  <img src="${image}" alt="${currentProduct.name} thumbnail ${index + 1}" class="aspect-square w-full object-cover">
                </button>
              `).join("")}
            </div>

            <p class="text-xs leading-6 text-slate-500 sm:text-sm">
              More product angles and completed-work photos can be added here later. For now, these are sample gallery images to help the page feel complete.
            </p>
          </div>

          <div class="flex flex-col">
            <p class="text-sm font-medium uppercase tracking-[0.2em] text-amber-700">${currentProduct.category || "Furniture"}</p>
            <h1 class="mt-3 text-3xl font-bold text-slate-900 sm:text-4xl">${currentProduct.name}</h1>

            <p class="mt-4 text-2xl font-semibold text-amber-800">${formatPrice(currentProduct.price)}</p>

            <p class="mt-5 text-sm leading-7 text-slate-600 sm:text-base">
              ${currentProduct.desc || "No description available for this product yet."}
            </p>

            <div class="mt-5 rounded-2xl bg-amber-50 px-4 py-3 text-sm text-amber-900">
              Stock available: <span class="font-semibold">${currentProduct.stock ?? 0}</span>
            </div>

            <div class="mt-6 flex flex-col gap-3 sm:flex-row">
              <button
                onclick="addToCart()"
                class="inline-flex flex-1 items-center justify-center rounded-2xl bg-amber-600 px-5 py-4 text-sm font-medium text-white"
              >
                Add to Cart
              </button>

              <a
                href="https://wa.me/919381049087?text=I%20want%20${encodeURIComponent(currentProduct.name)}"
                class="inline-flex flex-1 items-center justify-center rounded-2xl bg-green-600 px-5 py-4 text-sm font-medium text-white"
              >
                Order on WhatsApp
              </a>
            </div>
          </div>
        </div>
      `;

      bindGalleryEvents();
      renderGallery();
    }

    window.addToCart = function addToCart() {
      if (!currentProduct) return;

      const cart = JSON.parse(localStorage.getItem("cart") || "[]");
      const existing = cart.find((item) => item.id === currentProduct.id);

      if (existing) {
        existing.qty += 1;
      } else {
        cart.push({
          id: currentProduct.id,
          name: currentProduct.name,
          price: currentProduct.price,
          img: currentProduct.img,
          qty: 1
        });
      }

      localStorage.setItem("cart", JSON.stringify(cart));
      alert("Added to cart");
    };

    loadProduct();
  </script>
</body>
</html>
