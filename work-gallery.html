<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RR Furnitures | Our Previous Work</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-50 text-slate-800">
  <nav class="border-b border-slate-200 bg-white">
    <div class="mx-auto flex max-w-6xl flex-col gap-3 px-4 py-4 sm:px-6 md:flex-row md:items-center md:justify-between">
      <a href="index.html" class="text-xl font-bold text-amber-800 sm:text-2xl">RR Furniture</a>

      <div class="flex flex-wrap items-center gap-3 text-sm">
        <a href="index.html" class="rounded-full px-3 py-2 text-slate-700 hover:bg-slate-100">Home</a>
        <a href="products.html" class="rounded-full px-3 py-2 text-slate-700 hover:bg-slate-100">Products</a>
        <a href="https://wa.me/919381049087" class="rounded-full bg-green-600 px-4 py-2 font-medium text-white">WhatsApp</a>
      </div>
    </div>
  </nav>

  <main class="mx-auto max-w-6xl px-4 py-8 sm:px-6 sm:py-10">
    <section class="rounded-[2rem] bg-white p-6 shadow sm:p-8">
      <div class="flex flex-col gap-4 md:flex-row md:items-end md:justify-between">
        <div>
          <p class="text-sm font-medium uppercase tracking-[0.18em] text-amber-700">Our Previous Work</p>
          <h1 id="galleryTitle" class="mt-2 text-3xl font-bold text-slate-900 sm:text-4xl">Project Gallery</h1>
          <p id="galleryDesc" class="mt-3 max-w-2xl text-sm leading-6 text-slate-600 sm:text-base">
            A few sample project images are shown here for testing. You can replace them with your real completed work later.
          </p>
        </div>

        <a href="index.html#top-picks" class="inline-flex items-center justify-center rounded-2xl border border-slate-200 px-5 py-3 text-sm font-medium text-slate-700">
          Back to Home
        </a>
      </div>

      <div id="galleryGrid" class="mt-8 grid gap-5 sm:grid-cols-2 lg:grid-cols-3"></div>
    </section>
  </main>

  <script>
    const galleries = {
      bedroom: {
        title: "Contemporary Bedroom Work",
        description: "Sample bedroom and wardrobe projects. Replace these with your real completed bedroom interiors later.",
        images: [
          "https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?q=80&w=1200&auto=format&fit=crop",
          "https://images.unsplash.com/photo-1484154218962-a197022b5858?q=80&w=1200&auto=format&fit=crop",
          "https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?q=80&w=1200&auto=format&fit=crop&sat=-20",
          "https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?q=80&w=1200&auto=format&fit=crop&bri=5"
        ]
      },
      dining: {
        title: "Dining and Living Work",
        description: "Sample dining and family-space photos for testing the gallery experience.",
        images: [
          "https://images.unsplash.com/photo-1595526114035-0d45ed16cfbf?q=80&w=1200&auto=format&fit=crop",
          "https://images.unsplash.com/photo-1513694203232-719a280e022f?q=80&w=1200&auto=format&fit=crop",
          "https://images.unsplash.com/photo-1484101403633-562f891dc89a?q=80&w=1200&auto=format&fit=crop",
          "https://images.unsplash.com/photo-1460317442991-0ec209397118?q=80&w=1200&auto=format&fit=crop"
        ]
      },
      commercial: {
        title: "Cafe and Commercial Work",
        description: "Sample cafe, restaurant, and commercial woodwork projects to demonstrate the gallery page.",
        images: [
          "https://images.unsplash.com/photo-1552566626-52f8b828add9?q=80&w=1200&auto=format&fit=crop",
          "https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?q=80&w=1200&auto=format&fit=crop",
          "https://images.unsplash.com/photo-1445116572660-236099ec97a0?q=80&w=1200&auto=format&fit=crop",
          "https://images.unsplash.com/photo-1559339352-11d035aa65de?q=80&w=1200&auto=format&fit=crop"
        ]
      }
    };

    const params = new URLSearchParams(window.location.search);
    const design = params.get("design") || "bedroom";
    const selectedGallery = galleries[design] || galleries.bedroom;

    document.getElementById("galleryTitle").textContent = selectedGallery.title;
    document.getElementById("galleryDesc").textContent = selectedGallery.description;

    const grid = document.getElementById("galleryGrid");
    selectedGallery.images.forEach((imageUrl, index) => {
      const card = document.createElement("article");
      card.className = "overflow-hidden rounded-[1.75rem] bg-stone-50 shadow";

      card.innerHTML = `
        <div class="aspect-[4/3] overflow-hidden">
          <img src="${imageUrl}" alt="${selectedGallery.title} ${index + 1}" class="h-full w-full object-cover">
        </div>
        <div class="p-4">
          <p class="text-sm font-medium text-slate-900">Project Image ${index + 1}</p>
          <p class="mt-1 text-xs leading-5 text-slate-500">Dummy gallery image for testing. Replace with your actual completed work later.</p>
        </div>
      `;

      grid.appendChild(card);
    });
  </script>
</body>
</html>
